<!DOCTYPE html>
<html>
<head>
  <title>Live Login Validation</title>
  <style>
    body {
      font-family: Arial;
    }

    input {
      display: block;
      margin-bottom: 5px;
      padding: 8px;
      width: 250px;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
      display: block;
    }

    .input-error {
      border: 1px solid red;
    }
  </style>
</head>
<body>

<h2>Login</h2>

<form>

  <!-- Username -->
  <label>Username</label>
  <input type="text" id="username">
  <span id="usernameError" class="error"></span>

  <!-- Email -->
  <label>Email</label>
  <input type="text" id="email">
  <span id="emailError" class="error"></span>

  <!-- Password -->
  <label>Password</label>
  <input type="password" id="password">
  <span id="passwordError" class="error"></span>

  <input type="submit">

</form>
<script>



</script>
</body>
</html>
