<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Layout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: #000;
            padding: 20px;
            border-radius: 15px;
        }

        .display {
            background: #111;
            color: white;
            font-size: 2em;
            padding: 15px;
            text-align: right;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .number {
            background: #333;
            color: white;
        }

        .operator {
            background: orange;
            color: white;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>

<body>

<div class="calculator">
    <div class="display">0</div>

    <div class="buttons">
        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator">÷</button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="operator">×</button>

        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="operator">−</button>

        <button class="number zero">0</button>
        <button class="operator">+</button>
    </div>
</div>
<script>

document.querySelectorAll("");





</script>

</body>
</html>
