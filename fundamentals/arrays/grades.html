<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div>
      <input type="number" id="num1" placeholder="grade1" /><br /><br />
      <input type="number" id="num2" placeholder="grade2" /><br /><br />
      <input type="number" id="num3" placeholder="grade3" /><br /><br />
      <input type="number" id="num4" placeholder="grade4" /><br /><br />
      <input type="number" id="num5" placeholder="grade5" /><br /><br />
      <button onClick="save()">Save Scores</button>
      <button onClick="calculate()">Calculate</button>

      <p id="results"></p>
    </div>

    <script>
      let marks = [];

      function save() {
        for (let i = 1; i <= 5; i++) {
          let input = document.getElementById("num" + i);

          marks.push(Number(input.value));

          input.value = "";
        }
        console.log(marks);
      }
      function calculate() {
        let total = 0;
        for (let j = 0; j < marks.length; j++) {
          total += marks[j];
        }
        let average = total / marks.length;
        let status = average >= 50 ? "Pass" : "Fail";

        let grade = "";
        if (average >= 70) {
          grade = "A";
        } else if (average >= 60) {
          grade = "B";
        } else if (average >= 50) {
          grade = "C";
        } else if (average >= 40) {
          grade = "D";
        } else {
          grade = "F";
        }

        document.getElementById("results").innerHTML =
          `Total marks:${total} <br> Average: ${average} <br> Grade: ${grade} <br> Status:${status} `;
      }
    </script>
  </body>
</html>
